name: CCR Android CI

on:
  push:
    branches:
      - main
      - "codex/android-*"
    paths:
      - android/**
      - local-samples/**
      - .gitignore
      - .github/workflows/android-ci.yml
  pull_request:
    paths:
      - android/**
      - local-samples/**
      - .gitignore
      - .github/workflows/android-ci.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK packages
        shell: powershell
        run: |
          $sdkManager = Get-ChildItem -LiteralPath "$env:ANDROID_HOME\cmdline-tools" -Recurse -Filter sdkmanager.bat |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $sdkManager) { throw "sdkmanager.bat was not found" }
          & $sdkManager "platforms;android-37.0" "build-tools;36.0.0" "platform-tools"
          if ($LASTEXITCODE -ne 0) { throw "Android SDK package installation failed" }

      - name: Verify Gradle Wrapper
        working-directory: android
        run: .\gradlew.bat --version

      - name: Verify fixed frame-accuracy fixtures
        run: |
          node .\android\tools\verify-frame-accuracy.mjs
          node .\android\tools\verify-representative-resolution-fixtures.mjs --manifest-only
          node .\android\tools\verify-source-contract.mjs

      - name: Test and build internal APK
        working-directory: android
        run: .\gradlew.bat lintInternalDebug testInternalDebugUnitTest assembleInternalDebug assembleInternalDebugAndroidTest assembleInternalBenchmark :macrobenchmark:assembleInternalBenchmark --stacktrace

      - name: Verify APK privacy contract
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\android\scripts\verify-apk-privacy.ps1
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\android\scripts\verify-apk-privacy.ps1 -Apk .\android\app\build\outputs\apk\internal\benchmark\app-internal-benchmark.apk

      - name: Upload internal app APKs and reports
        uses: actions/upload-artifact@v6
        with:
          name: ccr-android-0.2.0-alpha.4-internal
          path: |
            android/app/build/outputs/apk/internal/debug/app-internal-debug.apk
            android/app/build/outputs/apk/internal/benchmark/app-internal-benchmark.apk
            android/app/build/reports/**
            android/app/build/test-results/**
            android/macrobenchmark/build/reports/**
            android/macrobenchmark/build/outputs/androidTest-results/**
          if-no-files-found: error
          retention-days: 14

      - name: Upload test-only instrumentation APKs
        uses: actions/upload-artifact@v6
        with:
          name: ccr-android-0.2.0-alpha.4-test-tools
          path: |
            android/app/build/outputs/apk/androidTest/internal/debug/app-internal-debug-androidTest.apk
            android/macrobenchmark/build/outputs/apk/internal/benchmark/macrobenchmark-internal-benchmark.apk
          if-no-files-found: error
          retention-days: 7
