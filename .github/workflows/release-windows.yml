name: CCR Windows Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Retry a missing release for the package.json version
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check out pushed revision
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Detect version increase
        id: version
        shell: bash
        run: |
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const { appendFileSync, readFileSync } = require("node:fs");

          const versionPattern = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/;
          const packageJson = JSON.parse(readFileSync("package.json", "utf8"));
          const packageLock = JSON.parse(readFileSync("package-lock.json", "utf8"));
          const currentVersion = String(packageJson.version ?? "");
          const lockRootVersion = String(packageLock.packages?.[""]?.version ?? "");
          const requestedVersion = String(process.env.REQUESTED_VERSION ?? "").trim();
          const output = (name, value) => appendFileSync(process.env.GITHUB_OUTPUT, `${name}=${value}\n`);

          if (!versionPattern.test(currentVersion)) {
            throw new Error(`package.json version must match X.Y.Z: ${currentVersion}`);
          }
          if (String(packageLock.version ?? "") !== currentVersion || lockRootVersion !== currentVersion) {
            throw new Error(`package-lock.json version must match package.json version ${currentVersion}`);
          }

          if (requestedVersion) {
            if (!versionPattern.test(requestedVersion) || requestedVersion !== currentVersion) {
              throw new Error(`Requested version must match package.json version ${currentVersion}: ${requestedVersion}`);
            }
            output("changed", "true");
            output("version", currentVersion);
            output("tag", `v${currentVersion}`);
            process.exit(0);
          }

          const before = process.env.BEFORE_SHA ?? "";
          if (!before || /^0+$/.test(before)) {
            throw new Error("A previous main revision is required to detect a version increase");
          }
          const previousPackage = JSON.parse(execFileSync(
            "git",
            ["show", `${before}:package.json`],
            { encoding: "utf8" },
          ));
          const previousVersion = String(previousPackage.version ?? "");

          if (previousVersion === currentVersion) {
            output("changed", "false");
            process.exit(0);
          }
          if (!versionPattern.test(previousVersion)) {
            throw new Error(`Previous package.json version must match X.Y.Z: ${previousVersion}`);
          }
          const parts = (version) => version.split(".").map(Number);
          const current = parts(currentVersion);
          const previous = parts(previousVersion);
          const increased = current.some((value, index) =>
            value > previous[index] && current.slice(0, index).every((part, prior) => part === previous[prior]));
          if (!increased) {
            throw new Error(`Version must increase: ${previousVersion} -> ${currentVersion}`);
          }

          output("changed", "true");
          output("version", currentVersion);
          output("tag", `v${currentVersion}`);
          NODE
        env:
          BEFORE_SHA: ${{ github.event.before }}
          REQUESTED_VERSION: ${{ inputs.version }}

  release-windows:
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out release revision
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release target
        shell: powershell
        run: |
          $package = Get-Content -Raw -Encoding UTF8 -LiteralPath package.json | ConvertFrom-Json
          if ([string]$package.version -ne $env:RELEASE_VERSION) {
            throw "Detected version $env:RELEASE_VERSION does not match package.json version $($package.version)"
          }

          git fetch --tags --force
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to fetch release tags"
          }
          git rev-parse --verify --quiet "refs/tags/$env:RELEASE_TAG" *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Release tag already exists: $env:RELEASE_TAG"
          }
          $originalErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = "SilentlyContinue"
          gh release view $env:RELEASE_TAG *> $null
          $releaseExitCode = $LASTEXITCODE
          $ErrorActionPreference = $originalErrorActionPreference
          if ($releaseExitCode -eq 0) {
            throw "GitHub Release already exists: $env:RELEASE_TAG"
          }
          exit 0
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.detect-version.outputs.version }}
          RELEASE_TAG: ${{ needs.detect-version.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Electron distribution
        shell: powershell
        run: |
          node node_modules/electron/install.js
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to install the Electron distribution"
          }
          if (-not (Test-Path -LiteralPath "node_modules/electron/dist/electron.exe")) {
            throw "Electron distribution is missing after installation"
          }

      - name: Set up pinned FFmpeg
        shell: powershell
        run: ./scripts/setup-ffmpeg.ps1

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run package:win

      - name: Verify Windows installer
        run: npm run verify:package

      - name: Publish GitHub Release
        shell: powershell
        run: |
          $package = Get-Content -Raw -Encoding UTF8 -LiteralPath package.json | ConvertFrom-Json
          $setup = "artifacts/CT-Cine-Reviewer-Setup-$($package.version).exe"
          $checksum = "$setup.sha256"
          $blockmap = "$setup.blockmap"
          $metadata = "artifacts/latest.yml"

          foreach ($asset in @($setup, $checksum, $blockmap, $metadata)) {
            if (-not (Test-Path -LiteralPath $asset)) {
              throw "Release asset is missing: $asset"
            }
          }

          gh release create $env:RELEASE_TAG $setup $checksum $blockmap $metadata `
            --target $env:GITHUB_SHA `
            --title "CT Cine Reviewer $env:RELEASE_TAG" `
            --generate-notes `
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.detect-version.outputs.tag }}
