name: CCR Windows Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release tag and source
        shell: powershell
        run: |
          $tag = $env:RELEASE_TAG
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must match vX.Y.Z: $tag"
          }

          $package = Get-Content -Raw -Encoding UTF8 -LiteralPath package.json | ConvertFrom-Json
          $expectedTag = "v$($package.version)"
          if ($tag -ne $expectedTag) {
            throw "Release tag $tag does not match package.json version $($package.version)"
          }

          git fetch --no-tags origin main:refs/remotes/origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to fetch origin/main"
          }

          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Tagged commit must be included in origin/main"
          }
        env:
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Electron distribution
        shell: powershell
        run: |
          node node_modules/electron/install.js
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to install the Electron distribution"
          }
          if (-not (Test-Path -LiteralPath "node_modules/electron/dist/electron.exe")) {
            throw "Electron distribution is missing after installation"
          }

      - name: Set up pinned FFmpeg
        shell: powershell
        run: ./scripts/setup-ffmpeg.ps1

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run package:win

      - name: Verify Windows installer
        run: npm run verify:package

      - name: Publish GitHub Release
        shell: powershell
        run: |
          $package = Get-Content -Raw -Encoding UTF8 -LiteralPath package.json | ConvertFrom-Json
          $setup = "artifacts/CT-Cine-Reviewer-Setup-$($package.version).exe"
          $checksum = "$setup.sha256"
          $blockmap = "$setup.blockmap"
          $metadata = "artifacts/latest.yml"

          foreach ($asset in @($setup, $checksum, $blockmap, $metadata)) {
            if (-not (Test-Path -LiteralPath $asset)) {
              throw "Release asset is missing: $asset"
            }
          }

          gh release create $env:RELEASE_TAG $setup $checksum $blockmap $metadata `
            --verify-tag `
            --title "CT Cine Reviewer $env:RELEASE_TAG" `
            --generate-notes `
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
