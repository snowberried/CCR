name: CCR Windows Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release tag and source
        shell: powershell
        run: |
          $tag = $env:RELEASE_TAG
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must match vX.Y.Z: $tag"
          }

          $package = Get-Content -Raw -Encoding UTF8 -LiteralPath package.json | ConvertFrom-Json
          $expectedTag = "v$($package.version)"
          if ($tag -ne $expectedTag) {
            throw "Release tag $tag does not match package.json version $($package.version)"
          }

          git fetch --no-tags origin main:refs/remotes/origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to fetch origin/main"
          }

          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Tagged commit must be included in origin/main"
          }
        env:
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up pinned FFmpeg
        shell: powershell
        run: ./scripts/setup-ffmpeg.ps1

      - name: Run tests
        run: npm test

      - name: Build and verify Windows installer
        run: |
          npm run package:win
          npm run verify:package

      - name: Publish GitHub Release
        shell: powershell
        run: |
          $package = Get-Content -Raw -Encoding UTF8 -LiteralPath package.json | ConvertFrom-Json
          $setup = "artifacts/CT-Cine-Reviewer-Setup-$($package.version).exe"
          $checksum = "$setup.sha256"

          if (-not (Test-Path -LiteralPath $setup)) {
            throw "Installer is missing: $setup"
          }
          if (-not (Test-Path -LiteralPath $checksum)) {
            throw "Checksum is missing: $checksum"
          }

          gh release create $env:RELEASE_TAG $setup $checksum `
            --verify-tag `
            --title "CT Cine Reviewer $env:RELEASE_TAG" `
            --generate-notes `
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
