name: CCR Desktop CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up pinned FFmpeg
        shell: powershell
        run: ./scripts/setup-ffmpeg.ps1

      - name: Run tests
        run: npm test

      - name: Build desktop product
        run: npm run build
